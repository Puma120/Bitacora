<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d2ff"/>
      <stop offset="1" stop-color="#007bb5"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.7"/>
      <stop offset="0.4" stop-color="white" stop-opacity="0.0"/>
      <stop offset="1" stop-color="white" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Frutiger Aero Glossy Background -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#glass)"/>
  <rect x="36" y="36" width="440" height="440" rx="116" stroke="white" stroke-opacity="0.6" stroke-width="8"/>
  
  <!-- Map Pin Icon -->
  <g transform="translate(136, 110) scale(10)" fill="white" filter="url(#glow)">
    <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" />
  </g>
</svg>